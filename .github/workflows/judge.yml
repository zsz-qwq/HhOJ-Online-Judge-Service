name: HhOJ Online Judge
 
on:
  push:
    branches: [main, master]
  workflow_dispatch:
 
jobs:
  judge:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
 
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ gcc time curl jq
          pip install requests
 
      - name: Fetch Submissions from API
        id: fetch
        run: |
          echo "Fetching pending submissions..."
          curl -s -H "X-API-Key: ${{ secrets.HHOJ_API_KEY }}" \
            "${{ secrets.HHOJ_HOST }}/api/judge_fetch.php?batch=1&inline_testcases=1" \
            -o submissions.json
          echo "Submissions fetched:"
          cat submissions.json | jq '.submissions | length' || echo "0"
 
      - name: Process Submissions
        run: |
          python3 src/judge.py \
            --api-key "${{ secrets.HHOJ_API_KEY }}" \
            --host "${{ secrets.HHOJ_HOST }}" \
            --submissions submissions.json
 
      - name: Generate Summary Report
        if: always()
        run: |
          if [ -f summary.md ]; then
            cat summary.md >> $GITHUB_STEP_SUMMARY
          else
            echo "## HhOJ Judge Result" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Verdict**: Unknown Error (UKE)" >> $GITHUB_STEP_SUMMARY
          fi
 
      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: judge-results
          path: |
            status.txt
            judge_result.json
            compile_error.log
            run_error.log
            summary.md
            ans*.out
          if-no-files-found: ignore
