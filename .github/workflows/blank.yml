name: HhOJ Judge
on:
  workflow_dispatch:
jobs:
  judge:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HHOJ_API_URL: ${{ secrets.HHOJ_API_URL }}
      HHOJ_API_KEY: ${{ secrets.HHOJ_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        run: sudo apt-get update && sudo apt-get install -y gcc g++ mono-complete default-jdk python3 fpc
      - name: Judge
        run: python3 src/judge.py --site-url "$HHOJ_API_URL" --api-key "$HHOJ_API_KEY" --work-dir /tmp/hhoj
