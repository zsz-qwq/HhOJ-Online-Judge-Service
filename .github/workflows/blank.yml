name: HhOJ Judge

on:
  workflow_dispatch:

jobs:
  judge:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HHOJ_API_URL: ${{ secrets.HHOJ_API_URL }}
      HHOJ_API_KEY: ${{ secrets.HHOJ_API_KEY }}
    steps:
      - name: Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ g++-14 mono-complete default-jdk python3 fpc
      - name: Judge
        run: |
          python3 << 'PYEOF'
import json, subprocess, os, sys, tempfile, shutil, base64, urllib.request, time, resource

API = os.environ["HHOJ_API_URL"].rstrip("/")
KEY = os.environ["HHOJ_API_KEY"]

def post(path, obj):
    body = json.dumps(obj).encode()
    req = urllib.request.Request(API + path, data=body,
        headers={"X-API-Key": KEY, "Content-Type": "application/json"}, method="POST")
    try:
        with urllib.request.urlopen(req, timeout=30) as r:
            return json.loads(r.read())
    except Exception as e:
        print(f"[ERR] POST {path}: {e}")
        return None

def cinfo(lang, base, exe):
    bl = lang.replace("_o2", "")
    o2 = ["-O2"] if lang.endswith("_o2") else []
    if bl == "c":
        return base + ".c", ["gcc", "-o", exe, base + ".c", "-lm", "-std=c11"] + o2, [exe]
    if bl == "cpp11":
        return base + ".cpp", ["g++", "-o", exe, base + ".cpp", "-std=c++11", "-lm"] + o2, [exe]
    if bl == "cpp14":
        return base + ".cpp", ["g++", "-o", exe, base + ".cpp", "-std=c++14", "-lm"] + o2, [exe]
    if bl == "cpp23":
        return base + ".cpp", ["g++-14", "-o", exe, base + ".cpp", "-std=c++23", "-lm"] + o2, [exe]
    if bl == "java":
        return base + ".java", ["javac", base + ".java"], ["java", "-cp", os.path.dirname(base), "Main"]
    if bl == "csharp":
        return base + ".cs", ["mcs", "-out:" + exe + ".exe", base + ".cs"], ["mono", exe + ".exe"]
    if bl == "pascal":
        return base + ".pas", ["fpc", base + ".pas"], [exe]
    return None, None, None

def judge(sub):
    sid = sub["id"]
    code = sub["code"]
    lang = sub["language"]
    tl = sub["time_limit"]
    ml = sub["memory_limit"]
    tcs = sub["testcases"]
    tl_s = tl / 1000.0
    ml_b = ml * 1024 * 1024
    print(f"--- #{sid} {lang} tl={tl}ms ml={ml}MB tc={len(tcs)} ---")
    wd = tempfile.mkdtemp(prefix=f"hhoj_{sid}_")
    try:
        base = os.path.join(wd, "Main")
        exe = os.path.join(wd, "Main")
        status, score, t_time, m_mem, err = "re", 0, 0, 0, ""
        nl = {"cpp": "cpp14", "python": "python3"}.get(lang, lang)
        if nl == "python3":
            sf = base + ".py"
            with open(sf, "w") as f:
                f.write(code)
            cmd, mx = ["python3", sf], 2
        else:
            sf, cc, cmd = cinfo(nl, base, exe)
            if not sf:
                return dict(submission_id=sid, status="re", score=0, time_used=0,
                           memory_used=0, error_message=f"Unsupported: {lang}")
            with open(sf, "w") as f:
                f.write(code)
            r = subprocess.run(cc, capture_output=True, text=True, timeout=30, cwd=wd)
            if r.returncode != 0:
                ce = (r.stderr or r.stdout or "")[:3000]
                print(f"  CE: {ce[:200]}")
                return dict(submission_id=sid, status="ce", score=0, time_used=0,
                           memory_used=0, error_message=ce)
            mx = 3 if nl in ("java", "csharp") else 1
        if not tcs:
            return dict(submission_id=sid, status="re", score=0, time_used=0,
                       memory_used=0, error_message="No testcases")
        status = "accepted"
        mx_sc = 0
        for tc in tcs:
            tid, tsc = tc["id"], tc["score"]
            mx_sc += tsc
            ind, outd = None, None
            if tc.get("inlined") and tc.get("input_data") and tc.get("output_data"):
                ind = base64.b64decode(tc["input_data"])
                outd = base64.b64decode(tc["output_data"])
            if not ind or not outd:
                try:
                    rq = urllib.request.Request(tc["input_url"], headers={"X-API-Key": KEY})
                    ind = urllib.request.urlopen(rq, timeout=15).read()
                    rq = urllib.request.Request(tc["output_url"], headers={"X-API-Key": KEY})
                    outd = urllib.request.urlopen(rq, timeout=15).read()
                except Exception as e:
                    status, err = "re", f"Download tc #{tid} failed: {e}"
                    print(f"  {err}")
                    break
            inf = os.path.join(wd, "in.txt")
            ouf = os.path.join(wd, "out.txt")
            with open(inf, "wb") as f:
                f.write(ind)
            eff = max(ml_b * mx, 128 * 1024 * 1024)
            pe = (lambda m=eff: os.setrlimit(os.RLIMIT_AS, (m, m))) if nl != "python3" else None
            rc = ["java", f"-Xmx{max(ml, 128)}M", "-cp", wd, "Main"] if nl == "java" else cmd
            if nl == "java":
                pe = None
            t0 = time.time()
            try:
                p = subprocess.Popen(rc, stdin=open(inf, "rb"), stdout=open(ouf, "wb"),
                    stderr=subprocess.PIPE, cwd=wd, preexec_fn=pe)
                try:
                    p.wait(timeout=tl_s + 1)
                except subprocess.TimeoutExpired:
                    p.kill()
                    p.wait()
                    t_time = max(t_time, int((time.time() - t0) * 1000))
                    status, err = "tle", f"TLE on tc #{tid}"
                    print(f"  {err}")
                    break
                t_time = max(t_time, int((time.time() - t0) * 1000))
            except Exception as e:
                status, err = "re", f"Runtime error on tc #{tid}: {e}"
                print(f"  {err}")
                break
            if p.returncode != 0:
                se = p.stderr.read().decode(errors="replace")[:500]
                status, err = "re", f"RE (exit {p.returncode}) on tc #{tid}: {se}"
                print(f"  {err}")
                break
            try:
                m_mem = max(m_mem, resource.getrusage(resource.RUSAGE_CHILDREN).ru_maxrss)
            except Exception:
                pass
            with open(ouf, "rb") as f:
                act = f.read().rstrip()
            exp = outd.rstrip()
            if act != exp:
                status = "wrong"
                al, el = act.split(b"\n"), exp.split(b"\n")
                dp = next((i for i in range(min(len(al), len(el))) if al[i] != el[i]), -1)
                if dp >= 0:
                    err = f"WA on tc #{tid}, line {dp + 1}"
                else:
                    err = f"WA on tc #{tid} (len {len(act)}/{len(exp)})"
                print(f"  {err}")
                break
            score += tsc
        if status == "accepted":
            score = mx_sc
        print(f"  => {status} {score}/{mx_sc} {t_time}ms {m_mem}KB")
        return dict(submission_id=sid, status=status, score=score,
                   time_used=t_time, memory_used=m_mem, error_message=err)
    except Exception as e:
        print(f"  FATAL: {e}")
        return dict(submission_id=sid, status="re", score=0, time_used=0,
                   memory_used=0, error_message=str(e)[:3000])
    finally:
        shutil.rmtree(wd, ignore_errors=True)

def main():
    rnd, emp = 0, 0
    while rnd < 30:
        rnd += 1
        print(f"===== Round {rnd} =====")
        try:
            rq = urllib.request.Request(
                API + "/api/judge_fetch.php?batch=10&inline_testcases=1",
                headers={"X-API-Key": KEY})
            data = json.loads(urllib.request.urlopen(rq, timeout=30).read())
        except Exception as e:
            print(f"[ERR] fetch: {e}")
            time.sleep(5)
            continue
        subs = data.get("submissions", [])
        if not subs:
            emp += 1
            if emp >= 3:
                print("No more, exit.")
                break
            time.sleep(5)
            continue
        emp = 0
        results = [judge(s) for s in subs]
        if results:
            r = post("/api/judge_report.php", {"results": results})
            if not r:
                for res in results:
                    post("/api/judge_report.php", res)
        time.sleep(3)
    print("Done.")

if __name__ == "__main__":
    main()
PYEOF
